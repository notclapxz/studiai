name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS-Apple-Silicon
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macOS-Intel
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Create .env
        shell: bash
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "VITE_CULQI_PUBLIC_KEY=${{ secrets.VITE_CULQI_PUBLIC_KEY }}" >> .env

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: StudiAI ${{ github.ref_name }}
          releaseBody: |
            ## Instalación

            ### Windows
            Descarga el archivo `.msi` o `.exe` e instálalo normalmente.

            ### macOS (Apple Silicon — M1/M2/M3)
            Descarga el `.dmg` con `aarch64` en el nombre.

            ### macOS (Intel)
            Descarga el `.dmg` con `x64` en el nombre.

            ---

            **Primera vez en macOS:** Si macOS bloquea la app, haz clic derecho → Abrir → Abrir.
            O en terminal: `xattr -cr /Applications/studyai.app`
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  publish-update-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate and upload latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${GITHUB_REF_NAME}
          VERSION=${TAG#v}

          # La versión en los nombres de archivo viene de tauri.conf.json, no del tag
          TAURI_VERSION=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          echo "Tag: ${TAG} | Version manifest: ${VERSION} | Tauri file version: ${TAURI_VERSION}"

          # Descargar .sig files del release (generados por tauri-action)
          mkdir -p /tmp/sigs
          gh release download ${TAG} --pattern "*.sig" --dir /tmp/sigs
          ls -la /tmp/sigs/

          # macOS: tauri-action nombra sin versión en el .app.tar.gz
          MAC_ARM_SIG=$(cat "/tmp/sigs/studyai_aarch64.app.tar.gz.sig" 2>/dev/null | tr -d '\n' || echo "")
          MAC_X64_SIG=$(cat "/tmp/sigs/studyai_x64.app.tar.gz.sig" 2>/dev/null | tr -d '\n' || echo "")

          # Windows: tauri-action incluye la versión de tauri.conf.json en el nombre
          WIN_SIG=$(cat "/tmp/sigs/studyai_${TAURI_VERSION}_x64-setup.exe.sig" 2>/dev/null | tr -d '\n' || echo "")
          WIN_MSI_SIG=$(cat "/tmp/sigs/studyai_${TAURI_VERSION}_x64_en-US.msi.sig" 2>/dev/null | tr -d '\n' || echo "")
          [ -z "$WIN_SIG" ] && WIN_SIG="$WIN_MSI_SIG"

          echo "MAC_ARM_SIG length: ${#MAC_ARM_SIG}"
          echo "MAC_X64_SIG length: ${#MAC_X64_SIG}"
          echo "WIN_SIG length: ${#WIN_SIG}"

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg mac_arm_sig "$MAC_ARM_SIG" \
            --arg mac_x64_sig "$MAC_X64_SIG" \
            --arg win_sig "$WIN_SIG" \
            --arg tag "$TAG" \
            --arg tv "$TAURI_VERSION" \
            '{
              version: $version,
              notes: "Nueva versión de StudiAI disponible.",
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  url: ("https://github.com/notclapxz/studiai/releases/download/" + $tag + "/studyai_aarch64.app.tar.gz"),
                  signature: $mac_arm_sig
                },
                "darwin-x86_64": {
                  url: ("https://github.com/notclapxz/studiai/releases/download/" + $tag + "/studyai_x64.app.tar.gz"),
                  signature: $mac_x64_sig
                },
                "windows-x86_64": {
                  url: ("https://github.com/notclapxz/studiai/releases/download/" + $tag + "/studyai_" + $tv + "_x64-setup.exe"),
                  signature: $win_sig
                }
              }
            }' > latest.json

          cat latest.json
          gh release upload ${TAG} latest.json --clobber

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS-Apple-Silicon
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macOS-Intel
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Create .env
        shell: bash
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "VITE_CULQI_PUBLIC_KEY=${{ secrets.VITE_CULQI_PUBLIC_KEY }}" >> .env

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: StudiAI ${{ github.ref_name }}
          releaseBody: |
            ## Instalación

            ### Windows
            Descarga el archivo `.msi` o `.exe` e instálalo normalmente.

            ### macOS (Apple Silicon — M1/M2/M3)
            Descarga el `.dmg` con `aarch64` en el nombre.

            ### macOS (Intel)
            Descarga el `.dmg` con `x64` en el nombre.

            ---

            **Primera vez en macOS:** Si macOS bloquea la app, haz clic derecho → Abrir → Abrir.
            O en terminal: `xattr -cr /Applications/studyai.app`
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload sig artifacts
        if: matrix.os == 'macos-latest' && matrix.target == 'aarch64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm-sig
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/studyai.app.tar.gz.sig
          retention-days: 1
          if-no-files-found: warn

      - name: Upload windows sig artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: win-sig
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.nsis.zip.sig
          retention-days: 1
          if-no-files-found: warn

  publish-update-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download mac sig
        uses: actions/download-artifact@v4
        with:
          name: mac-arm-sig
          path: /tmp/sigs/mac/
        continue-on-error: true

      - name: Download win sig
        uses: actions/download-artifact@v4
        with:
          name: win-sig
          path: /tmp/sigs/win/
        continue-on-error: true

      - name: Generate latest.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TAG=${GITHUB_REF_NAME}

          MAC_ARM_SIG=$(cat /tmp/sigs/mac/*.sig 2>/dev/null | head -1 || echo "")
          WIN_SIG=$(cat /tmp/sigs/win/*.sig 2>/dev/null | head -1 || echo "")

          cat > latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "Nueva versión de StudiAI disponible.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "url": "https://github.com/notclapxz/studiai/releases/download/${TAG}/studyai_aarch64.app.tar.gz",
                "signature": "${MAC_ARM_SIG}"
              },
              "darwin-x86_64": {
                "url": "https://github.com/notclapxz/studiai/releases/download/${TAG}/studyai_x64.app.tar.gz",
                "signature": ""
              },
              "windows-x86_64": {
                "url": "https://github.com/notclapxz/studiai/releases/download/${TAG}/studyai_${VERSION}_x64-setup.exe",
                "signature": "${WIN_SIG}"
              }
            }
          }
          ENDJSON

          gh release upload ${TAG} latest.json --clobber
